<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬件资讯 - Knowledge Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f5f7fa;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .header {
            background: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .header-meta {
            color: #666;
            font-size: 14px;
        }
        .content-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .content-item {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
        }
        .content-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .content-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回知识库首页</a>

        <div class="header">
            <h1>💻 硬件资讯</h1>
            <div class="header-meta">
                硬件价格走势、性能评测与购买指南
            </div>
        </div>

        <div class="content-list">
            <a href="./ram-prices.html" class="content-item">
                <div class="content-title">内存条价格走势</div>
                <div class="content-desc">DDR4/DDR5 内存价格历史数据与趋势分析</div>
            </a>
        </div>
    </div>
</body>
</html>
