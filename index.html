<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - 探索知识的宇宙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .category-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }
        .category-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.15);
        }
        .category-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>📚 Knowledge Hub</h1>
        <p>探索知识的宇宙</p>
    </div>
    <div class="container">
        <div class="categories">
            <a href="./hardware/ram-prices.html" class="category-card">
                <div class="category-icon">💾</div>
                <h2>硬件价格1</h2>
                <p>内存条、显卡等硬件价格走势</p>
            </a>
            <a href="./smartwatch/index.html" class="category-card">
                <div class="category-icon">⌚</div>
                <h2>智能手表</h2>
                <p>表盘搜索算法、用户反馈分析</p>
            </a>
        </div>
    </div>
</body>
</html>
