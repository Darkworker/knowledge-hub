<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - 探索知识的宇宙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            margin-top: 40px;
        }
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .category-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .category-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }
        .category-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .category-card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .category-card p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            line-height: 1.6;
        }
        .update-time {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>📚 Knowledge Hub</h1>
        <p>探索知识的宇宙 · 持续更新中</p>
    </div>
    <div class="container">
        <div class="section-title">📂 知识分类</div>
        <div class="categories">
            <a href="./openclaw/index.html" class="category-card">
                <div class="category-icon">🦀</div>
                <h2>OpenClaw 专题</h2>
                <p>开源 AI Agent 框架：最新特性、社区动态与业务应用案例</p>
            </a>
            <a href="./ai-news/index.html" class="category-card">
                <div class="category-icon">🤖</div>
                <h2>AI Agent 新闻</h2>
                <p>追踪 AI Agent 领域最新动态、融资、技术突破与安全事件</p>
            </a>
            <a href="./hardware/ram-prices.html" class="category-card">
                <div class="category-icon">💾</div>
                <h2>硬件价格</h2>
                <p>内存条、显卡等硬件价格走势追踪</p>
            </a>
        </div>
    </div>
    <div class="update-time">
        最后更新：2026-03-02 | 自动维护中
    </div>
</body>
</html>
